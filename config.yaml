data:
  min_samples: 5000
  random_state: 42
  test_size: 0.15
  val_size: 0.15

sources:
  kaggle:
    datasets:
      - "kazanova/sentiment140"
  reddit:
    subreddits: ["politics", "worldnews", "technology"]
    limit_per_subreddit: 500
  reviews:
    - name: "amazon_reviews"
      url: "https://raw.githubusercontent.com/nickmuchi/amazon-reviews-scraper/main/data/amazon_reviews.csv"

cleaning:
  max_text_length: 1000
  remove_urls: true
  remove_html: true
  remove_emojis: true
  remove_special_chars: true
  lowercase: true

training:
  random_state: 42
  test_size: 0.15
  val_size: 0.15
  tfidf_max_features: 5000
  tfidf_ngram_range: [1, 2]
  lr_max_iter: 1000
  distilbert_model: "distilbert-base-uncased"
  distilbert_max_length: 128
  distilbert_batch_size: 16
  distilbert_epochs: 3
  distilbert_learning_rate: 2e-5

api:
  host: "0.0.0.0"
  port: 8000
  max_text_length: 1000
